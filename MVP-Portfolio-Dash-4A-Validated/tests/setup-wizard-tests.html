<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Setup Wizard Tests · MVP Portfolio Dashboard</title>
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/themes.css">
  <link rel="stylesheet" href="../css/setup-wizard.css">
</head>
<body>
  <main class="test-page">
    <h1>Setup Wizard Tests</h1>
    <p>This page performs local setup-shell checks only. It must not make Finnhub API calls.</p>

    <section class="panel">
      <h2>Automated checks</h2>
      <div id="test-results" aria-live="polite"></div>
      <button class="button button--secondary" id="reset-state" type="button">Reset setup state</button>
      <button class="button button--primary" id="open-wizard" type="button">Open setup wizard</button>
    </section>

    <section class="panel">
      <h2>Current local state summary</h2>
      <dl>
        <dt>Setup status</dt>
        <dd data-setup-status>Unknown</dd>
        <dt>Active symbols</dt>
        <dd data-active-symbols>Unknown</dd>
        <dt>Projection horizon</dt>
        <dd data-projection-horizon>Unknown</dd>
        <dt>Theme</dt>
        <dd data-theme-label>Unknown</dd>
      </dl>
    </section>
  </main>

  <script type="module">
    import {
      createDefaultSettingsState,
      DEFAULT_FINNHUB_API_KEY,
      getSettingsStorageKey,
      loadSettingsState,
      resetFinnhubApiKey,
      saveSettingsState,
      resetSettingsStateForTesting
    } from '../js/settings/settings-state.js';
    import { LiveDataDiagnostics } from '../js/diagnostics/live-data-diagnostics.js';
    import { initSetupWizard, openSetupWizard } from '../js/ui/setup-wizard.js';

    const results = document.getElementById('test-results');
    const checks = [];

    function check(name, predicate) {
      let passed = false;
      let detail = '';
      try {
        passed = Boolean(predicate());
      } catch (error) {
        detail = error.message;
      }
      checks.push({ name, passed, detail });
    }

    function renderResults() {
      results.replaceChildren();
      const list = document.createElement('ol');
      checks.forEach((result) => {
        const item = document.createElement('li');
        item.textContent = `${result.passed ? 'PASS' : 'FAIL'}: ${result.name}${result.detail ? ` (${result.detail})` : ''}`;
        item.dataset.status = result.passed ? 'pass' : 'fail';
        list.append(item);
      });
      results.append(list);
    }

    function renderSummary() {
      const state = loadSettingsState();
      document.querySelector('[data-setup-status]').textContent = state.setup.completed ? 'Setup complete' : 'Setup incomplete';
      document.querySelector('[data-active-symbols]').textContent = state.activeSymbols.join(', ');
      document.querySelector('[data-projection-horizon]').textContent = `${state.projectionHorizonYears} years`;
      document.querySelector('[data-theme-label]').textContent = state.theme;
    }

    const defaultState = createDefaultSettingsState();
    check('default setup is incomplete', () => defaultState.setup.completed === false);
    check('default lots contain DCO, VTV, and ONEQ', () => {
      const tickers = defaultState.lots.map((lot) => lot.ticker).sort().join(',');
      return tickers === 'DCO,ONEQ,VTV';
    });
    check('default benchmarks contain SPY, IWM, AVUV, AVDV, and PSCH', () => {
      const tickers = defaultState.benchmarks.map((benchmark) => benchmark.ticker).sort().join(',');
      return tickers === 'AVDV,AVUV,IWM,PSCH,SPY';
    });
    check('default projection horizon is within 1 to 10 years', () => {
      return defaultState.projectionHorizonYears >= 1 && defaultState.projectionHorizonYears <= 10;
    });
    check('settings storage key is local-only', () => getSettingsStorageKey() === 'mvpPortfolioDash.settings.v1');
    check('Version 2.3 ships without a Finnhub key', () => {
      return defaultState.api.apiKey === DEFAULT_FINNHUB_API_KEY
        && defaultState.api.hasKey === false
        && defaultState.api.keySource === 'session-entry';
    });
    check('API key backup inclusion defaults off', () => defaultState.exportPreferences.includeApiKeyInBackup === false);
    check('backup reminder configuration is absent', () => {
      return !Object.keys(defaultState.exportPreferences).some((key) => key.includes('Reminder'))
        && !Object.hasOwn(defaultState.backup, 'editsSinceLastBackup')
        && !Object.hasOwn(defaultState.backup, 'dismissedReminderUntil');
    });

    const diagnosticSnapshot = await new LiveDataDiagnostics({
      requestQueue: { getBudgetStatus: () => ({ available: true }) }
    }).getSnapshot();
    check('diagnostics exclude the active API key', () => {
      return diagnosticSnapshot.security.apiKeyExposed === false
        && diagnosticSnapshot.security.apiKeyLogged === false
        && !Object.hasOwn(diagnosticSnapshot, 'activeApiKey');
    });

    const overrideState = createDefaultSettingsState();
    overrideState.api.apiKey = 'browser-test-override';
    overrideState.api.keySource = 'user-override';
    saveSettingsState(overrideState, { incrementEditCount: false });
    check('user API-key override remains available in the page session', () => loadSettingsState().api.apiKey === 'browser-test-override');
    check('user API-key override is excluded from Local Storage', () => {
      const raw = window.localStorage.getItem(getSettingsStorageKey());
      return raw && !raw.includes('browser-test-override') && !Object.hasOwn(JSON.parse(raw).api, 'apiKey');
    });

    const legacyState = createDefaultSettingsState();
    legacyState.api.apiKey = 'legacy-browser-key-to-scrub';
    legacyState.api.keySource = 'user-override';
    // Deliberately writes a legacy fixture so loadSettingsState can prove it is scrubbed.
    // codeql[js/clear-text-storage-of-sensitive-data]
    window.localStorage.setItem(getSettingsStorageKey(), JSON.stringify(legacyState));
    check('legacy clear-text API key remains available for the current session', () => {
      return loadSettingsState().api.apiKey === 'legacy-browser-key-to-scrub';
    });
    check('legacy clear-text API key is scrubbed during load', () => {
      const raw = window.localStorage.getItem(getSettingsStorageKey());
      return raw && !raw.includes('legacy-browser-key-to-scrub') && !Object.hasOwn(JSON.parse(raw).api, 'apiKey');
    });

    saveSettingsState(resetFinnhubApiKey(loadSettingsState()), { incrementEditCount: false });
    check('API-key clear removes the runtime session key', () => {
      const state = loadSettingsState();
      return state.api.apiKey === '' && state.api.hasKey === false && state.api.keySource === 'session-entry';
    });

    resetSettingsStateForTesting();

    renderSummary();
    initSetupWizard();
    check('wizard has six steps with no Backup Reminder step', () => {
      const labels = [...document.querySelectorAll('.setup-steps li')].map((item) => item.textContent);
      return labels.length === 6 && labels.includes('Projection Horizon') && !labels.includes('Backup Reminder');
    });

    document.querySelector('.setup-footer .button--primary').click();
    const renderedKeyInput = document.querySelector('.setup-step input[type="password"]');
    check('wizard renders an empty masked API-key field', () => {
      return renderedKeyInput && renderedKeyInput.value === '';
    });
    renderedKeyInput.value = 'browser-ui-override';
    renderedKeyInput.dispatchEvent(new Event('input', { bubbles: true }));
    const resetButton = [...document.querySelectorAll('.setup-step button')]
      .find((button) => button.textContent === 'Clear session key');
    resetButton.click();
    check('wizard clear control removes the session key', () => renderedKeyInput.value === '');

    document.querySelector('.setup-footer .button--primary').click();
    const lotRowsBeforeAdd = document.querySelectorAll('.setup-table tbody tr').length;
    const addLotButton = [...document.querySelectorAll('.setup-step button')]
      .find((button) => button.textContent === 'Add lot');
    addLotButton.click();
    const addedLotRow = [...document.querySelectorAll('.setup-table tbody tr')].at(-1);
    const [tickerInput, sharesInput, dateInput, priceInput] = addedLotRow.querySelectorAll('input');
    check('setup Add lot appends a row and focuses its ticker', () => {
      return document.querySelectorAll('.setup-table tbody tr').length === lotRowsBeforeAdd + 1
        && document.activeElement === tickerInput
        && tickerInput.value === '';
    });

    tickerInput.value = 'QQQ';
    tickerInput.dispatchEvent(new Event('input', { bubbles: true }));
    sharesInput.focus();
    sharesInput.value = '2.5';
    sharesInput.dispatchEvent(new Event('input', { bubbles: true }));
    check('editing setup lot values preserves the current row and field focus', () => {
      return addedLotRow.isConnected && document.activeElement === sharesInput;
    });

    dateInput.value = '2026-07-13';
    dateInput.dispatchEvent(new Event('input', { bubbles: true }));
    priceInput.value = '100';
    priceInput.dispatchEvent(new Event('input', { bubbles: true }));

    document.querySelector('.setup-footer .button--primary').click();
    const benchmarkRowsBeforeAdd = document.querySelectorAll('.setup-table tbody tr').length;
    const addBenchmarkButton = [...document.querySelectorAll('.setup-step button')]
      .find((button) => button.textContent === 'Add benchmark');
    addBenchmarkButton.click();
    const addedBenchmarkRow = [...document.querySelectorAll('.setup-table tbody tr')].at(-1);
    const benchmarkTickerInput = addedBenchmarkRow.querySelector('input[aria-label="Benchmark ticker"]');
    check('setup Add benchmark appends a blank row and focuses its ticker', () => {
      return document.querySelectorAll('.setup-table tbody tr').length === benchmarkRowsBeforeAdd + 1
        && document.activeElement === benchmarkTickerInput
        && benchmarkTickerInput.value === '';
    });
    benchmarkTickerInput.value = 'QQQX';
    benchmarkTickerInput.dispatchEvent(new Event('input', { bubbles: true }));
    const benchmarkLabelInput = addedBenchmarkRow.querySelector('input[aria-label="Benchmark display label"]');
    benchmarkLabelInput.value = 'QQQ test benchmark';
    benchmarkLabelInput.dispatchEvent(new Event('input', { bubbles: true }));
    document.querySelector('.setup-footer .button--primary').click();
    check('Projection Horizon is the only setup preference control', () => {
      return document.getElementById('setup-title').textContent === 'Projection Horizon'
        && document.querySelectorAll('.setup-step select').length === 1
        && !document.querySelector('.setup-step input[type="color"], .setup-step input[type="range"]')
        && !document.querySelector('.setup-step').textContent.includes('Theme');
    });
    document.querySelector('.setup-footer .button--primary').click();
    check('Projection Horizon proceeds directly to Review', () => document.getElementById('setup-title').textContent === 'Review');
    document.querySelector('.setup-footer .button--ghost').click();
    document.querySelector('.setup-footer .button--ghost').click();
    document.querySelector('.setup-footer .button--ghost').click();

    const saveForLaterButton = [...document.querySelectorAll('.setup-footer button')]
      .find((button) => button.textContent === 'Save and close later');
    saveForLaterButton.click();
    const savedAddedLot = loadSettingsState().lots.find((lot) => lot.ticker === 'QQQ');
    check('setup saves a newly entered lot as a persistent record', () => {
      return savedAddedLot?.shares === 2.5
        && savedAddedLot?.purchasePrice === 100
        && savedAddedLot?.acquisitionDate === '2026-07-13';
    });

    renderResults();

    document.getElementById('reset-state').addEventListener('click', () => {
      resetSettingsStateForTesting();
      renderSummary();
      openSetupWizard();
    });

    document.getElementById('open-wizard').addEventListener('click', () => openSetupWizard());
  </script>
</body>
</html>
